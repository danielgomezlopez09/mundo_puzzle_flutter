name: Build APK with Docker

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: cirrusci/flutter:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Flutter dependencies
        run: |
          flutter config --no-analytics
          flutter pub get

      - name: Build APK Release
        run: |
          echo "Building APK with Flutter..."
          flutter build apk --release 2>&1 | tee /tmp/build.log || {
            echo "Release build failed, trying debug build..."
            flutter build apk --debug 2>&1 | tee -a /tmp/build.log
          }

      - name: Find and copy APK
        run: |
          echo "=== Buscando APK en todas las rutas ==="
          APK_FILE=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found!"
            exit 1
          fi
          echo "APK found at: $APK_FILE"
          echo "Copying APK to artifacts directory..."
          mkdir -p ./artifacts
          cp "$APK_FILE" ./artifacts/
          ls -lh ./artifacts/

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./artifacts/
          compression-level: 0
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/build.log
          retention-days: 7
          if-no-files-found: ignore

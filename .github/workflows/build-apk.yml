name: Build APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl

      - name: Download and setup Flutter
        run: |
          cd /tmp
          git clone https://github.com/flutter/flutter.git --branch stable --depth 1
          /tmp/flutter/bin/flutter config --no-analytics
          /tmp/flutter/bin/flutter doctor

      - name: Get Flutter dependencies
        run: /tmp/flutter/bin/flutter pub get

      - name: Build APK Release
        run: |
          /tmp/flutter/bin/flutter build apk \
            --release \
            --no-shrink \
            --verbose 2>&1 | tee build.log

      - name: Find APK files
        run: |
          echo "=== Searching for APK files ==="
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found in build/"
          echo ""
          echo "=== Listing build directory structure ==="
          ls -la build/ 2>/dev/null || echo "build/ directory not found"
          echo ""
          echo "=== Listing app directory ==="
          ls -la build/app/ 2>/dev/null || echo "build/app/ directory not found"
          echo ""
          echo "=== Listing outputs directory ==="
          ls -la build/app/outputs/ 2>/dev/null || echo "build/app/outputs/ directory not found"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 7

      - name: Upload APK files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/apk/release/
          if-no-files-found: ignore
          retention-days: 30

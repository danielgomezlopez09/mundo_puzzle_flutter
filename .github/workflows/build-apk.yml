name: Build APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl

      - name: Download and setup Flutter
        run: |
          cd /tmp
          git clone https://github.com/flutter/flutter.git --branch stable --depth 1
          /tmp/flutter/bin/flutter config --no-analytics
          /tmp/flutter/bin/flutter doctor

      - name: Get Flutter dependencies
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          cd $GITHUB_WORKSPACE
          flutter pub get

      - name: Build APK Release
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          cd $GITHUB_WORKSPACE
          flutter build apk --release 2>&1 | tee /tmp/build.log

      - name: Find all APK files
        run: |
          echo "=== Searching for APK files ==="
          find $GITHUB_WORKSPACE/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ github.workspace }}/build/app/outputs/apk/release/
          if-no-files-found: ignore
          retention-days: 30

name: Build APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl

      - name: Download and setup Flutter
        run: |
          cd /tmp
          # Clone Flutter and checkout a specific version known to work
          git clone https://github.com/flutter/flutter.git
          cd /tmp/flutter
          # Try version 3.13.0 which should have compatible Gradle
          git checkout 3.13.0 || git checkout 3.16.0 || git checkout 3.19.0 || echo "Using default version"
          /tmp/flutter/bin/flutter config --no-analytics
          /tmp/flutter/bin/flutter doctor

      - name: Get Flutter dependencies
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          cd $GITHUB_WORKSPACE
          flutter pub get

      - name: Generate Android platform files
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          cd $GITHUB_WORKSPACE
          # Check if android folder exists, if not create it
          if [ ! -d "android" ]; then
            echo "Android folder not found. Creating it..."
            /tmp/flutter/bin/flutter create --platforms android . --force 2>&1 | tee /tmp/flutter_create.log
          else
            echo "Android folder already exists"
          fi

      - name: Update local.properties
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          cd $GITHUB_WORKSPACE
          echo "sdk.dir=/usr/lib/android-sdk" > android/local.properties
          echo "flutter.sdk=/tmp/flutter" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          cat android/local.properties

      - name: Build APK Release
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          export ANDROID_SDK_ROOT=/usr/lib/android-sdk
          export GRADLE_USER_HOME=$HOME/.gradle
          cd $GITHUB_WORKSPACE
          echo "Building APK using Gradle directly..."
          # First, generate the Gradle files
          /tmp/flutter/bin/flutter pub get 2>&1 | tee /tmp/build.log
          # Build the APK
          cd $GITHUB_WORKSPACE/build/app
          if [ -d "build" ]; then
            echo "Using existing build directory..."
            ./gradlew assembleRelease 2>&1 | tee -a /tmp/build.log || {
              echo "Gradle build failed, trying with wrapper..."
              cd $GITHUB_WORKSPACE
              /tmp/flutter/bin/flutter build apk --release 2>&1 | tee -a /tmp/build.log
            }
          else
            echo "Building with Flutter..."
            /tmp/flutter/bin/flutter build apk --release 2>&1 | tee -a /tmp/build.log || {
              echo "Release build failed, trying debug build..."
              /tmp/flutter/bin/flutter build apk --debug 2>&1 | tee -a /tmp/build.log
            }
          fi

      - name: Find all APK files
        run: |
          echo "=== Searching for APK files ==="
          echo "Searching in build directory..."
          find $GITHUB_WORKSPACE/build -name "*.apk" -type f 2>/dev/null || echo "No APK in build/"
          echo "---"
          echo "Listing build directory structure:"
          ls -laR $GITHUB_WORKSPACE/build/app/outputs/ 2>/dev/null || echo "No outputs directory"
          echo "---"
          echo "Searching everywhere for APK:"
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK files found anywhere"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/build.log
            /tmp/flutter_create.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Find and copy APK
        run: |
          echo "=== Buscando APK en todas las rutas ==="
          APK_FILE=$(find ${{ github.workspace }} -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found!"
            exit 1
          fi
          echo "APK found at: $APK_FILE"
          echo "Copying APK to artifacts directory..."
          mkdir -p ${{ github.workspace }}/artifacts
          cp "$APK_FILE" ${{ github.workspace }}/artifacts/
          ls -lh ${{ github.workspace }}/artifacts/

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ github.workspace }}/artifacts/
          compression-level: 0
          if-no-files-found: ignore
          retention-days: 30

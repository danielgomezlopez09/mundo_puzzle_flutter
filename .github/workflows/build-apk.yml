name: Build APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl

      - name: Download and setup Flutter
        run: |
          cd /tmp
          git clone https://github.com/flutter/flutter.git --branch stable --depth 1
          /tmp/flutter/bin/flutter config --no-analytics
          /tmp/flutter/bin/flutter doctor

      - name: Get Flutter dependencies
        run: /tmp/flutter/bin/flutter pub get

      - name: Build APK Release (without flutter create)
        run: |
          cd /home/ubuntu/mundo_puzzle_flutter
          /tmp/flutter/bin/flutter build apk \
            --release \
            --verbose 2>&1 | tee build.log

      - name: Find all APK files
        run: |
          echo "=== Searching for ALL APK files in entire project ==="
          find . -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK files found"
          echo ""
          echo "=== Listing complete build directory structure ==="
          find build -type f 2>/dev/null | head -30 || echo "build/ directory not found"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload all APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: |
            build/app/outputs/apk/release/
            build/app/outputs/flutter-apk/
            build/app/outputs/
          if-no-files-found: ignore
          retention-days: 30

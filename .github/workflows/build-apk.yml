name: Build APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl

      - name: Download and setup Flutter
        run: |
          cd /tmp
          git clone https://github.com/flutter/flutter.git --branch stable --depth 1
          /tmp/flutter/bin/flutter config --no-analytics
          /tmp/flutter/bin/flutter doctor

      - name: Get Flutter dependencies
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          cd $GITHUB_WORKSPACE
          flutter pub get

      - name: Generate Android platform files
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          cd $GITHUB_WORKSPACE
          # Check if android folder exists, if not create it
          if [ ! -d "android" ]; then
            echo "Android folder not found. Creating it..."
            /tmp/flutter/bin/flutter create --platforms android . --force 2>&1 | tee /tmp/flutter_create.log
          else
            echo "Android folder already exists"
          fi

      - name: Build APK Release
        run: |
          export PATH="/tmp/flutter/bin:$PATH"
          cd $GITHUB_WORKSPACE
          echo "Attempting to build APK with --release..."
          /tmp/flutter/bin/flutter build apk --release --verbose 2>&1 | tee /tmp/build.log || {
            echo "Release build failed, trying debug build..."
            /tmp/flutter/bin/flutter build apk --debug --verbose 2>&1 | tee -a /tmp/build.log
          }

      - name: Find all APK files
        run: |
          echo "=== Searching for APK files ==="
          echo "Searching in build directory..."
          find $GITHUB_WORKSPACE/build -name "*.apk" -type f 2>/dev/null || echo "No APK in build/"
          echo "---"
          echo "Listing build directory structure:"
          ls -laR $GITHUB_WORKSPACE/build/app/outputs/ 2>/dev/null || echo "No outputs directory"
          echo "---"
          echo "Searching everywhere for APK:"
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK files found anywhere"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/build.log
            /tmp/flutter_create.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ github.workspace }}/build/app/outputs/
          if-no-files-found: ignore
          retention-days: 30
